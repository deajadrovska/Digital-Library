<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FINKI Attendance App — Logo Digital Library</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <p class="eyebrow">Digital Library · 2025</p>
    <h1>Attendance App<br>Logo Variants</h1>
    <p class="subtitle">Logo concepts for the FINKI employee attendance tracking application. Click any to expand.</p>
    <div class="divider"></div>
  </header>

  <div class="filter-bar" id="filter-bar"></div>

  <main>
    <div class="grid" id="grid">
      <p class="loading">Loading logos...</p>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-stage">
        <img id="modal-img" src="" alt="" />
      </div>
      <div class="modal-body">
        <div class="card-number" id="modal-num"></div>
        <div class="modal-title" id="modal-title"></div>
        <div class="tags" id="modal-tags"></div>
      </div>
    </div>
  </div>

  <footer>FINKI Attendance App · Logo Digital Library · 2025</footer>

  <script src="js/app.js"></script>
</body>
</html>
